<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>あ</title>
    <link href="styles/style.css" rel="stylesheet">
    <script src="scripts/main.js" defer></script>
    <link rel="shortcut icon" href="images/a.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body>
    <div id="menu"></div>

    <div id="lesson">

      <header>
        <h2 id="lessonName"></h2>
        <div class="backToMenu" onclick="backToMenu()">Menu</div>
        <div class="test" onclick="showTest()">Test</div>
      </header>
      
      <main>
        <h3>Vocabulary</h3>
        <div id="vocabulary"></div>
        <h3>Grammer</h3>
        <div id="grammer"></div>
        <h3>Expressions</h3>
        <div id="expressions"></div>
      </main>
         
    </div>

    <div id="test">
      
      <header>
        <div class="backToMenu" onclick="backToMenu()">Menu</div>
        <div class="lesson" onclick="backToLesson()">Lesson</div>
      </header>

      <main>
        <div class="box">
          <p id="question"><b>Translate the following sentence:</b></p>
          <p id="testSentence"></p>
         <p id="testName"></p>
        </div>
        <textarea autofocus id="testarea" placeholder="type here"></textarea>
        <div id="answer" class="box"></div>
        <div id="check" onclick="checkAnswer()" > Check </div>
        <div id="next" onclick="nextQuestion()"> Next </div>

      </main>

    </div>

  </body>
</html>
